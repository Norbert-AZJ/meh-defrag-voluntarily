    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 777 }
          - { version: 2804 }
          - { version: 6290 }
          - { version: 1413 }
          - { version: 6383 }
          - { version: 8499 }
          - { version: 4754 }
